<body>
  <!-- Vidéo de fond -->
  <video autoplay muted loop id="backgroundVideo">
  <source src="backgroundVideo.mp4" type="video/mp4">
  </video>

<div class="overlay"></div>

  <!-- Contenu principal -->
  <div class="container">
    <h1 id="title">Fragen für einen Champion</h1>

    <div class="scores">
      <div>Gast ⭐ : <span id="scoreGuest">0</span></div>
      <div>Spieler 🎓 : <span id="scorePlayer">0</span></div>
    </div>

    <div id="currentPlayer">Aktueller Spieler : -</div>
    <div id="responder">Antwortender: Gast</div>

    <div class="buttons">
      <button id="guestBtn">Gast antwortet</button>
      <button id="playerBtn">Spieler antwortet</button>
    </div>

    <button id="startBtn"> Start</button>
    <button id="spinBtn">🎡 Drehen</button>
    <button id="nextQuestionBtn" class="hidden">Nächste Frage</button>

    <div id="questionBox">
      <h2 id="questionText">Klicke Start</h2>
      <div class="timer-bar">
        <div id="timerFill"></div>
      </div>
      <p id="timer">Zeit: 20s</p>
    </div>

    <div class="answerButtons">
      <button id="correctBtn">✅ Richtig</button>
      <button id="wrongBtn">❌ Falsch</button>
    </div>

    <div id="winner" class="hidden"></div>
    <button id="restartBtn" class="hidden">Neustart</button>
  </div>

  <script src="script.js"></script>
</body>
